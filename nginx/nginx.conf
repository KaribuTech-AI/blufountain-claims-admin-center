user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    # -----------------------------
    # GZIP COMPRESSION (optional but recommended)
    # -----------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    # -----------------------------
    # HTTP -> HTTPS redirect
    # -----------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name localhost;  # Replace with your domain if needed

        return 301 https://$host$request_uri;
    }

    # -----------------------------
    # HTTPS server for Angular
    # -----------------------------
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name localhost;  # Replace with your domain if needed

        root /usr/share/nginx/html;   # <-- Your Angular dist folder
        index index.html;

        client_max_body_size 50M;

        # SSL certificate paths
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Angular SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Optional: serve static assets efficiently
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4|webm)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public";
        }

        # Remove default welcome page if present
        location = /index.html.default {
            return 404;
        }

        # Remove any includes that might override root
        # include /etc/nginx/conf.d/*.conf;  # optional
    }
}