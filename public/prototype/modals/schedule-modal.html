<div id="schedule-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Schedule Call</h2>
                <button class="close-btn" onclick="closeModal('schedule-modal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Call Type</label>
                    <select>
                        <option>Policyholder Interview</option>
                        <option>Medical Provider Discussion</option>
                        <option>Team Review</option>
                        <option>Legal Consultation</option>
                        <option>Follow-up Call</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date & Time</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <input type="date">
                        <input type="time">
                    </div>
                </div>
                <div class="form-group">
                    <label>Duration</label>
                    <select>
                        <option>15 minutes</option>
                        <option>30 minutes</option>
                        <option>45 minutes</option>
                        <option>1 hour</option>
                        <option>2 hours</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Participants</label>
                    <textarea placeholder="Enter email addresses of participants, separated by commas..."></textarea>
                </div>
                <div class="form-group">
                    <label>Agenda</label>
                    <textarea placeholder="Brief description of what will be discussed..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closeModal('schedule-modal')">Cancel</button>
                <button class="primary" onclick="submitSchedule()">Schedule Call</button>
            </div>
        </div>
    </div>
