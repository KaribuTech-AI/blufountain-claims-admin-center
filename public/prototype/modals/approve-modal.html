<div id="approve-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Approve Claim</h2>
                <button class="close-btn" onclick="closeModal('approve-modal')">×</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 20px; color: var(--color-text-secondary);">
                    You are about to approve this claim. This will authorize the payout and notify the policyholder.
                </p>
                <div class="form-group">
                    <label>Approved Amount</label>
                    <input type="number" value="8500" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Approval Notes</label>
                    <textarea placeholder="Add any notes about this approval..."></textarea>
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select>
                        <option>Direct Deposit</option>
                        <option>Check</option>
                        <option>Wire Transfer</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closeModal('approve-modal')">Cancel</button>
                <button class="primary" onclick="submitApproval()">Approve & Process Payment</button>
            </div>
        </div>
    </div>
