<div id="new-claim-screen" class="screen">
            <div class="dashboard">
                <div class="detail-header">
                    <button class="back-button" onclick="backToDashboard()">← Cancel</button>
                    <h2 style="font-size: 18px; font-weight: 500; margin-left: auto;">Create New Claim</h2>
                </div>

                <div class="detail-content">
                    <div class="detail-section">
                        <h3>Policyholder Information</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="form-group">
                                <label>Policy Number</label>
                                <input type="text" placeholder="POL-XXXXX">
                            </div>
                            <div class="form-group">
                                <label>Policyholder Name</label>
                                <input type="text" placeholder="Full name">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" placeholder="email@example.com">
                            </div>
                            <div class="form-group">
                                <label>Phone</label>
                                <input type="text" placeholder="(555) 123-4567">
                            </div>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h3>Claim Details</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="form-group">
                                <label>Insurance Type</label>
                                <select>
                                    <option>Select type...</option>
                                    <option>Life insurance</option>
                                    <option>Short-term disability</option>
                                    <option>Long-term disability</option>
                                    <option>Accidental death & dismemberment</option>
                                    <option>Critical illness</option>
                                    <option>Hospital indemnity</option>
                                    <option>Accident insurance</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Claim Amount</label>
                                <input type="number" placeholder="0.00">
                            </div>
                            <div class="form-group">
                                <label>Incident Date</label>
                                <input type="date">
                            </div>
                            <div class="form-group">
                                <label>Priority</label>
                                <select>
                                    <option>Low</option>
                                    <option>Medium</option>
                                    <option>High</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea placeholder="Provide details about the claim..."></textarea>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h3>Assignment</h3>
                        <div class="form-group">
                            <label>Assign To</label>
                            <select>
                                <option>Select adjuster...</option>
                                <option>Sarah Kim</option>
                                <option>David Lee</option>
                                <option>Taylor Chen</option>
                            </select>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="primary" onclick="submitNewClaim()">Create Claim</button>
                        <button onclick="backToDashboard()">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ALL CLAIMS SCREEN -->
