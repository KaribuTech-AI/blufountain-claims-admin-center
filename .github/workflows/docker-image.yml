name: Docker Image CI

env:
  NODE_VERSION: 22
  CI: false

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            kaributechsworkflow/blufountain-claims-admin-angular:${{ github.sha }}
            kaributechsworkflow/blufountain-claims-admin-angular:latest

      - name: Update deployment.yaml
        run: |
          cd charts/UAT
          sed -i "s|kaributechsworkflow/blufountain-claims-admin-angular:.*|kaributechsworkflow/blufountain-claims-admin-angular:${{ github.sha }}|" deployment.yaml
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add deployment.yaml
          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes"

      - name: Push changes
        run: |
          git push
