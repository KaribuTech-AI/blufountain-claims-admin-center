apiVersion: apps/v1
kind: Deployment
metadata:
  name: blufountain-claims-admin-angular
  namespace: blufountain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blufountain-claims-admin-angular
  template:
    metadata:
      labels:
        app: blufountain-claims-admin-angular
        appVersion: 'b535ee1a4bccae173105fff0543aca0bbffade82'
    spec:
      containers:
      - name: blufountain-claims-admin-angular-container
        image: kaributechsworkflow/blufountain-claims-admin-angular:47b2c76b9b90c21a60e14dac008e5f5dad7bdb0d
        ports:
        - containerPort: 443
