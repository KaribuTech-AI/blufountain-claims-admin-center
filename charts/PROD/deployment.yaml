apiVersion: apps/v1
kind: Deployment
metadata:
  name: blufountain-claims-admin-angular
  namespace: blufountain
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blufountain-claims-admin-angular
  template:
    metadata:
      labels:
        app: blufountain-claims-admin-angular
    spec:
      containers:
      - name: blufountain-claims-admin-angular-container
        image: kaributechsworkflow/blufountain-web:6a5a0aab82401ba32b836a5af2ba577a98bf14eb
        ports:
        - containerPort: 8443
